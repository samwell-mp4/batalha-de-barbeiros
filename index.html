<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS support -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Battle Barber" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />

    <title>Batalha de Barbeiro</title>

    <!-- Schema.org: Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Battle Barber",
      "url": "https://battlebarber.com.br",
      "description": "Encontre os melhores barbeiros e barbearias perto de você. Agende online, veja avaliações reais.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://battlebarber.com.br/perfil?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Schema.org: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Battle Barber",
      "url": "https://battlebarber.com.br",
      "description": "Plataforma que conecta clientes aos melhores barbeiros.",
      "foundingDate": "2024",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contato@battlebarber.com.br",
        "contactType": "customer service"
      }
    }
    </script>

    <!-- Schema.org: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Battle Barber",
      "url": "https://battlebarber.com.br",
      "operatingSystem": "Web",
      "applicationCategory": "LifestyleApplication",
      "description": "Agende horários com barbeiros, participe de campeonatos e descubra barbearias próximas."
    }
    </script>
  </head>
  <body>
    <div id="root">
      <div id="splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:#030303;color:#fff;font-family:sans-serif">
        <div style="width:40px;height:40px;border:3px solid rgba(0,243,255,0.2);border-top-color:#00f3ff;border-radius:50%;animation:bb-spin 0.8s linear infinite;margin-bottom:16px"></div>
        <div style="color:#00f3ff;font-size:14px;letter-spacing:2px;text-transform:uppercase">Carregando...</div>
      </div>
      <style>@keyframes bb-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
